server:
  port: 8086

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/auth_users
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
app:
  jwt:
    secret: supersecretkey123456supersecretkey123456
    expiration: 3600000 # 1 hour in ms

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.example.auth: DEBUG
