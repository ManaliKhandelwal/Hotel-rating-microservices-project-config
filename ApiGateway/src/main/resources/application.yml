server:
  port: 8084

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: USERSERVICE
          uri: lb://USERSERVICE
          predicates:
            - Path=/api/v1/users/**
          filters:
            - AuthenticationFilter

        - id: HOTELSERVICE
          uri: lb://HOTELSERVICE
          predicates:
            - Path=/api/v1/hotels/**
          filters:
            - AuthenticationFilter

        - id: RATINGSERVICE
          uri: lb://RATING-SERVICE
          predicates:
            - Path=/api/v1/ratings/**
          filters:
            - AuthenticationFilter

        - id: AUTHSERVICE
          uri: lb://AUTHSERVICE
          predicates:
            - Path=/api/v1/auth/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka